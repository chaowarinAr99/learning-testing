services:
  mongo:
    image: mongo:7
    container_name: learning-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./db/seed.mongo.js:/docker-entrypoint-initdb.d/seed.mongo.js:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: learning-app
    depends_on:
      - mongo
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/learning_system_db
      MONGO_DB: learning_system_db
      CERTIFICATE_API_MODE: success
    ports:
      - "3000:3000"

volumes:
  mongo_data:
