name: Learning CI

on:
  push:
    paths:
      - 'learning/**'
      - '.github/workflows/learning-ci.yml'
  pull_request:
    paths:
      - 'learning/**'
      - '.github/workflows/learning-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: learning

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: learning/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        env:
          CI: true
        run: npm test -- --runInBand
