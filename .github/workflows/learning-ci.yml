name: Learning CI

on:
  push:
    paths:
      - 'learning/**'
      - '.github/workflows/learning-ci.yml'
  pull_request:
    paths:
      - 'learning/**'
      - '.github/workflows/learning-ci.yml'

jobs:
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: learning

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: learning/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        env:
          CI: true
        run: npm test -- --runInBand unit

  component:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: learning

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: learning/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Component tests
        env:
          CI: true
        run: npm test -- --runInBand component

  integration:
    runs-on: ubuntu-latest
    needs: [unit, component]
    defaults:
      run:
        working-directory: learning

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build smoke script
        run: node --check scripts/integration-smoke.mjs

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for health
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs --no-color
          exit 1

      - name: Run integration smoke
        run: node scripts/integration-smoke.mjs

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop stack
        if: always()
        run: docker compose down -v
